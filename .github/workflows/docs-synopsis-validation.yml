name: Docs Synopsis Validation

on:
  pull_request:
    paths:
      - "tools/update-synopsis.py"
      - "tools/j2render.py"
      - "index.ts"
      - "package.json"
      - "bun.lock"
      - "Makefile"
      - "README-template.md.j2"

jobs:
  verify-docs-synopsis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install jinja2
        run: pip install jinja2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install

      - name: Run full README generation
        env:
          LANG: ko_KR.UTF-8
          LC_ALL: ko_KR.UTF-8
        run: make synopsis

      - name: Verify README.md synopsis is up to date
        run: |
          if ! git diff --exit-code -- README.md; then
            echo "::error::README.md synopsis is out of sync. Please run 'make synopsis' locally and commit the changes."
            exit 1
          fi
